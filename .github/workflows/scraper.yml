name: Track Real Estate Ads

on:
  schedule:
    - cron: '0 13 * * *'  # Run at 13:00 UTC
  workflow_dispatch:
    inputs:
      resend_latest:
        description: 'Resend the latest report to Telegram (skip scraping)'
        type: boolean
        default: false

permissions:
  contents: write  # Allow write access to repository

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Use built-in GITHUB_TOKEN

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape
        if: ${{ inputs.resend_latest != true }}
        run: python main.py

      - name: Commit changes
        if: ${{ inputs.resend_latest != true }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/ reports/ price-history.json
          git commit -m "Daily update $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Send Telegram
        run: python send_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
